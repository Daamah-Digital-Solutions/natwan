# Netlify configuration for the Natwan Vite + React single-page app.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 8 requires Node >= 20.19 / 22.12
  NODE_VERSION = "22"

# SPA fallback: serve index.html for all client-side (react-router) routes, so
# deep links and refreshes on /about, /sectors, /projects, /gallery, /faq,
# /contact don't return a 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
